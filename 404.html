<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Relay▸Launch</title>
  <meta name="robots" content="noindex">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-dark: #0d1117;
      --brand-accent: #238636;
      --brand-accent-light: #2ea043;
      --brand-border: #21262d;
      --brand-surface: #161b22;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-link: #58a6ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background-color: var(--brand-dark);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }

    a { color: var(--text-link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 48px;
    }
    .brand span { color: var(--brand-accent-light); }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 480px;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      display: inline-block;
      background: var(--brand-accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--brand-accent-light); text-decoration: none; }

    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--brand-border);
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--text-secondary); background: var(--brand-surface); text-decoration: none; }
  </style>
</head>
<body>

  <div class="brand">Relay<span>▸</span>Launch</div>

  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>

  <div class="actions">
    <a href="/" class="btn-primary">Back to Home</a>
    <a href="solutions.html" class="btn-secondary">See Our Solutions</a>
  </div>

</body>
</html>
