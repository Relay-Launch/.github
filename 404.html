<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Relay▸Launch</title>
  <meta name="description" content="The page you're looking for doesn't exist. Let's get you back to Relay Launch.">
  <meta name="robots" content="noindex">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="theme-color" content="#238636">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand-dark: #0d1117;
      --brand-accent: #238636;
      --brand-accent-light: #2ea043;
      --brand-border: #21262d;
      --brand-surface: #161b22;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-link: #58a6ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background-color: var(--brand-dark);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    :focus-visible { outline: 2px solid var(--brand-accent-light); outline-offset: 2px; }

    a { color: var(--text-link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 48px;
    }
    .brand span { color: var(--brand-accent-light); }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--brand-accent-light);
      line-height: 1;
      margin-bottom: 8px;
      opacity: 0.3;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
    }

    p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 480px;
      margin-bottom: 32px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
    }

    .btn-primary {
      display: inline-block;
      background: var(--brand-accent);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .btn-primary:hover { background: var(--brand-accent-light); text-decoration: none; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--text-primary);
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      border: 1px solid var(--brand-border);
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    .btn-secondary:hover { border-color: var(--text-secondary); background: var(--brand-surface); text-decoration: none; }

    .helpful-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .helpful-links a {
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: color 0.2s ease;
    }
    .helpful-links a:hover { color: var(--text-primary); text-decoration: none; }

    @media print {
      body { background: #fff; color: #000; }
    }
  </style>
</head>
<body>

  <a href="/" class="brand" style="text-decoration:none;">Relay<span>▸</span>Launch</a>

  <div class="error-code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>

  <div class="actions">
    <a href="/" class="btn-primary">Back to Home</a>
    <a href="/solutions.html" class="btn-secondary">See Our Solutions</a>
  </div>

  <div class="helpful-links">
    <a href="/about.html">About Us</a>
    <a href="/work-with-us.html">Work With Us</a>
    <a href="mailto:hello@relaylaunch.com">Contact</a>
  </div>

</body>
</html>
