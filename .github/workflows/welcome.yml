name: Welcome New Requests

on:
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const isProjectRequest = issue.labels.some(l => l.name === 'project-request');
            const isQuestion = issue.labels.some(l => l.name === 'question' || l.name === 'consultation');

            let message = '';

            if (isProjectRequest) {
              message = [
                '## Thanks for reaching out to Relay▸Launch!',
                '',
                "We've received your project request and will review it shortly.",
                '',
                '**What happens next:**',
                '1. We review the details you provided (usually within 1-2 business days)',
                '2. We follow up at the contact info you shared to discuss next steps',
                "3. If it's a good fit, we schedule an intro call to dig deeper",
                '',
                'In the meantime, feel free to add any additional context to this thread.',
                '',
                '*— The Relay▸Launch Team*'
              ].join('\n');
            } else if (isQuestion) {
              message = [
                '## Thanks for your question!',
                '',
                "We've got your message and will get back to you soon.",
                '',
                'Expect a response within **1-2 business days**. If your question is time-sensitive, feel free to add more context here.',
                '',
                '*— The Relay▸Launch Team*'
              ].join('\n');
            } else {
              message = [
                '## Thanks for getting in touch with Relay▸Launch!',
                '',
                "We've received your message and will follow up within **1-2 business days**.",
                '',
                '*— The Relay▸Launch Team*'
              ].join('\n');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
