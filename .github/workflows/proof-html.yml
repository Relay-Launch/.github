name: Proof HTML
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install html-proofer
        run: gem install html-proofer --no-document

      - name: Run html-proofer
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
        run: |
          htmlproofer \
            --no-enforce-https \
            --no-check-external-hash \
            --ignore-empty-alt \
            --ignore-missing-alt \
            --ignore-urls "/^https?:\/\//" \
            --checks Links,Images,Scripts \
            ./
