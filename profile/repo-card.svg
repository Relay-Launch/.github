<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accentFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle accent glow top-left -->
  <ellipse cx="200" cy="80" rx="320" ry="160" fill="#238636" fill-opacity="0.06"/>

  <!-- Border -->
  <rect x="0" y="0" width="1280" height="1" fill="#21262d"/>
  <rect x="0" y="639" width="1280" height="1" fill="#21262d"/>

  <!-- Left green accent bar -->
  <rect x="0" y="0" width="5" height="640" fill="#2ea043"/>

  <!-- Top horizontal accent under brand -->
  <rect x="80" y="290" width="1120" height="1" fill="#21262d"/>

  <!-- Eyebrow pill tag -->
  <rect x="80" y="84" width="310" height="28" rx="14" fill="rgba(35,134,54,0.12)" stroke="rgba(46,160,67,0.4)" stroke-width="1"/>
  <text x="235" y="102" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="11" font-weight="700" fill="#2ea043" letter-spacing="1.6">SMALL BUSINESS INFRASTRUCTURE</text>

  <!-- Brand: Relay -->
  <text x="80" y="218"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="82" font-weight="800" fill="#e6edf3">Relay</text>
  <!-- Brand: arrow accent -->
  <text x="322" y="218"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="82" font-weight="800" fill="#2ea043">&#x25BA;</text>
  <!-- Brand: Launch -->
  <text x="386" y="218"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="82" font-weight="800" fill="#e6edf3">Launch</text>

  <!-- Tagline -->
  <text x="80" y="264"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="23" fill="#8b949e">Build Smarter. Launch Faster. Grow With Purpose.</text>

  <!-- Website — top right -->
  <text x="1200" y="102" text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="15" fill="#58a6ff">relaylaunch.com</text>

  <!-- === THREE PILLAR CARDS === -->

  <!-- Card 1: Connect -->
  <rect x="80" y="318" width="350" height="222" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <!-- card top accent -->
  <rect x="80" y="318" width="350" height="3" rx="1.5" fill="#238636" opacity="0.5"/>
  <!-- label -->
  <text x="108" y="362"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" font-weight="700" fill="#2ea043" letter-spacing="2">CONNECT</text>
  <!-- heading -->
  <text x="108" y="400"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">Unified Digital</text>
  <text x="108" y="432"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">Infrastructure</text>
  <!-- body -->
  <text x="108" y="468"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">Website · Email · Social · Dashboard</text>
  <text x="108" y="490"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">All connected. All automated.</text>
  <!-- package label -->
  <text x="108" y="522"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12" fill="#3fb950">Signal · Blueprint · Relay</text>

  <!-- Card 2: Automate (featured, green border) -->
  <rect x="465" y="318" width="350" height="222" rx="10" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <!-- featured badge -->
  <rect x="548" y="308" width="136" height="22" rx="11" fill="#238636"/>
  <text x="616" y="323" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" font-weight="700" fill="#ffffff" letter-spacing="0.5">MOST REQUESTED</text>
  <!-- label -->
  <text x="493" y="362"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" font-weight="700" fill="#2ea043" letter-spacing="2">AUTOMATE</text>
  <!-- heading -->
  <text x="493" y="400"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">Live Workflow</text>
  <text x="493" y="432"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">Automation</text>
  <!-- body -->
  <text x="493" y="468"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">Runs 24/7 · Zero manual entry</text>
  <text x="493" y="490"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">Free up 5-10 hours every week</text>
  <!-- package label -->
  <text x="493" y="522"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12" fill="#3fb950">Relay · Sustain</text>

  <!-- Card 3: Scale -->
  <rect x="850" y="318" width="350" height="222" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <!-- card top accent -->
  <rect x="850" y="318" width="350" height="3" rx="1.5" fill="#238636" opacity="0.5"/>
  <!-- label -->
  <text x="878" y="362"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="10" font-weight="700" fill="#2ea043" letter-spacing="2">SCALE</text>
  <!-- heading -->
  <text x="878" y="400"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">Grow Beyond</text>
  <text x="878" y="432"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="700" fill="#e6edf3">the Grind</text>
  <!-- body -->
  <text x="878" y="468"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">Real systems · Clear visibility</text>
  <text x="878" y="490"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#8b949e">Ongoing support as you grow</text>
  <!-- package label -->
  <text x="878" y="522"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12" fill="#3fb950">Blueprint · Relay · Sustain</text>

  <!-- Footer tagline -->
  <text x="80" y="600"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#484f58">RelayLaunch LLC · Victor David Medina, Founder</text>
  <text x="1200" y="600" text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="14" fill="#484f58">github.com/Relay-Launch</text>
</svg>
