<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RelayLaunch owner-approved AI operations banner</title>
  <desc id="desc">RelayLaunch branded banner with Warm Stone background, AI operations workflow cards, model-routing signals, and the tagline Every part of your business. One AI.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="56%" stop-color="#292524"/>
      <stop offset="100%" stop-color="#44403C"/>
    </linearGradient>
    <radialGradient id="gold" cx="20%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.42"/>
      <stop offset="58%" stop-color="#D97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="trust" cx="88%" cy="24%" r="54%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.34"/>
      <stop offset="70%" stop-color="#0D9488" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#A8A29E" stroke-width="1" stroke-opacity="0.12"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#gold)"/>
  <rect width="1280" height="640" fill="url(#trust)"/>
  <rect x="24" y="24" width="1232" height="592" rx="34" fill="none" stroke="#D6D3D1" stroke-opacity="0.18"/>
  <circle cx="1140" cy="112" r="160" fill="#0D9488" fill-opacity="0.12" filter="url(#blur)"/>
  <circle cx="220" cy="60" r="220" fill="#F59E0B" fill-opacity="0.10" filter="url(#blur)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(78 78)">
      <rect x="0" y="0" width="306" height="36" rx="18" fill="#D97706" fill-opacity="0.17" stroke="#F59E0B" stroke-opacity="0.62"/>
      <text x="153" y="24" text-anchor="middle" font-size="13" font-weight="800" letter-spacing="1.9" fill="#FCD34D">OWNER-APPROVED AI OPERATIONS</text>

      <text x="0" y="126" font-size="92" font-weight="800" fill="#F5F5F4">RelayLaunch</text>
      <text x="2" y="178" font-size="30" font-weight="800" fill="#FBBF24">Every part of your business. One AI.</text>
      <text x="2" y="222" font-size="22" fill="#D6D3D1">Daily Revenue Brief, Recovery Engine, Relay Deck, and CouncilVerse.</text>

      <rect x="0" y="264" width="612" height="78" rx="22" fill="#1C1917" fill-opacity="0.70" stroke="#A8A29E" stroke-opacity="0.28"/>
      <text x="32" y="296" font-size="18" font-weight="800" fill="#F5F5F4">AI prepares the work.</text>
      <text x="32" y="326" font-size="18" font-weight="800" fill="#FBBF24">You approve, skip, or ask why.</text>

      <g transform="translate(0 384)">
        <rect x="0" y="0" width="146" height="42" rx="21" fill="#292524" stroke="#D97706" stroke-opacity="0.62"/>
        <text x="73" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#F5F5F4">15 models</text>
        <rect x="164" y="0" width="148" height="42" rx="21" fill="#292524" stroke="#D97706" stroke-opacity="0.62"/>
        <text x="238" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#F5F5F4">7 providers</text>
        <rect x="330" y="0" width="184" height="42" rx="21" fill="#292524" stroke="#0D9488" stroke-opacity="0.62"/>
        <text x="422" y="27" text-anchor="middle" font-size="14" font-weight="700" fill="#F5F5F4">Cloudflare edge</text>
      </g>
    </g>

    <g transform="translate(772 92)">
      <rect x="0" y="0" width="406" height="456" rx="30" fill="#1C1917" fill-opacity="0.74" stroke="#A8A29E" stroke-opacity="0.25"/>
      <text x="34" y="54" font-size="15" font-weight="800" letter-spacing="2.4" fill="#F59E0B">THE OPERATIONS LOOP</text>

      <g fill="none" stroke="#F59E0B" stroke-opacity="0.58" stroke-width="2">
        <path d="M84 112 H322"/>
        <path d="M84 206 H322"/>
        <path d="M84 300 H322"/>
        <path d="M84 112 V300"/>
        <path d="M322 112 V300"/>
      </g>

      <g>
        <rect x="42" y="88" width="126" height="50" rx="16" fill="#292524" stroke="#D97706" stroke-opacity="0.75"/>
        <text x="105" y="119" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">signals</text>
        <rect x="238" y="88" width="126" height="50" rx="16" fill="#292524" stroke="#D97706" stroke-opacity="0.75"/>
        <text x="301" y="119" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">brief</text>

        <rect x="42" y="182" width="126" height="50" rx="16" fill="#292524" stroke="#0D9488" stroke-opacity="0.75"/>
        <text x="105" y="213" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">council</text>
        <rect x="238" y="182" width="126" height="50" rx="16" fill="#292524" stroke="#0D9488" stroke-opacity="0.75"/>
        <text x="301" y="213" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">approval</text>

        <rect x="42" y="276" width="126" height="50" rx="16" fill="#292524" stroke="#F59E0B" stroke-opacity="0.75"/>
        <text x="105" y="307" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">workflow</text>
        <rect x="238" y="276" width="126" height="50" rx="16" fill="#292524" stroke="#F59E0B" stroke-opacity="0.75"/>
        <text x="301" y="307" text-anchor="middle" font-size="13" font-weight="800" fill="#F5F5F4">proof</text>
      </g>

      <rect x="42" y="370" width="322" height="48" rx="24" fill="#D97706"/>
      <text x="203" y="401" text-anchor="middle" font-size="15" font-weight="800" fill="#F5F5F4">approve or skip, then the system moves</text>
    </g>

    <text x="78" y="594" font-size="15" font-weight="700" fill="#A8A29E">RelayLaunch LLC, Watertown MA</text>
    <text x="1202" y="594" text-anchor="end" font-size="15" font-weight="700" fill="#A8A29E">relaylaunch.com</text>
  </g>
</svg>
